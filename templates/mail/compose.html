{% extends 'base.html' %}
{% block title %}Tulis Email — i-kira Mail{% endblock %}

{% block content %}
<div style="max-width:720px;margin:0 auto;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
    <h1 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:1px;">TULIS EMAIL</h1>
    <a href="{% url 'mail:inbox' %}" class="btn btn-ghost btn-sm">← Kembali</a>
  </div>

  {% if messages %}
  {% for message in messages %}
  <div style="padding:12px 16px;border-radius:8px;margin-bottom:16px;background:rgba(230,51,41,.1);border:1px solid rgba(230,51,41,.25);color:#ff7070;font-size:.84rem;">
    {{ message }}
  </div>
  {% endfor %}
  {% endif %}

  <div class="card">
    <form method="post" >
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Kepada</label>
        <input type="text" name="recipients" value="{{ form.recipients.value|default:'' }}" placeholder="email@domain.com" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Subjek</label>
        <input type="text" name="subject" value="{{ form.subject.value|default:'' }}" placeholder="Subjek email..." class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Pesan</label>
        <textarea name="body_text" class="form-textarea" style="min-height:200px;" placeholder="Tulis pesan...">{{ form.body_text.value|default:'' }}</textarea>
      </div>

      <input type="hidden" name="cc" value="">
      <input type="hidden" name="bcc" value="">
      <input type="hidden" name="body_html" value="">

      <div style="display:flex;gap:10px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px;">
        <button type="submit" class="btn btn-primary">
          → Kirim Email
        </button>
        <a href="{% url 'mail:inbox' %}" class="btn btn-ghost">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
