{% extends 'base.html' %}
{% block title %}Tulis Email — i-kira Mail{% endblock %}
{% block content %}
<div style="max-width:720px;margin:0 auto;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
    <h1 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:1px;">TULIS EMAIL</h1>
    <a href="{% url 'mail:inbox' %}" class="btn btn-ghost btn-sm">← Kembali</a>
  </div>

  <div id="alertBox"></div>

  <div class="card">
    <form id="composeForm" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Kepada</label>
        <input type="text" name="recipients" placeholder="email@domain.com" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">CC (opsional)</label>
        <input type="text" name="cc" placeholder="cc@domain.com" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">BCC (opsional)</label>
        <input type="text" name="bcc" placeholder="bcc@domain.com" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Subjek</label>
        <input type="text" name="subject" placeholder="Subjek email..." class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Lampiran</label>
        <input type="file" name="attachments" multiple class="form-input" style="padding:10px;">
        <small style="color:var(--muted2);font-size:.75rem;">Boleh lebih dari satu file</small>
      </div>
      <div class="form-group">
        <label class="form-label">Pesan</label>
        <textarea name="body_text" class="form-textarea" style="min-height:200px;" placeholder="Tulis pesan..." required></textarea>
      </div>
      <input type="hidden" name="body_html" value="">
      <div style="display:flex;gap:10px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px;">
        <button type="submit" class="btn btn-primary" id="submitBtn">→ Kirim Email</button>
        <a href="{% url 'mail:inbox' %}" class="btn btn-ghost">Batal</a>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById('composeForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Mengirim...';
  btn.disabled = true;

  const formData = new FormData(this);
  const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

  fetch('/compose/', {
    method: 'POST',
    headers: {
      'X-CSRFToken': csrfToken,
      'X-Requested-With': 'XMLHttpRequest',
    },
    body: formData,
  })
  .then(response => response.json())
  .then(data => {
    if (data.status === 'ok') {
      showAlert('success', 'Email berhasil dikirim!');
      setTimeout(() => { window.location.href = '/'; }, 1500);
    } else {
      let msg = `<strong>${data.type || 'Error'}: ${data.message}</strong>`;
      if (data.traceback) {
        msg += `<pre style="margin-top:10px;font-size:.72rem;white-space:pre-wrap;opacity:.8;">${data.traceback}</pre>`;
      }
      showAlert('error', msg);
      btn.textContent = '→ Kirim Email';
      btn.disabled = false;
    }
  })
  .catch(err => {
    showAlert('error', 'Network error: ' + err.message);
    btn.textContent = '→ Kirim Email';
    btn.disabled = false;
  });
});

function showAlert(type, msg) {
  const box = document.getElementById('alertBox');
  const bg = type === 'error' ? 'rgba(230,51,41,.1)' : 'rgba(34,197,94,.1)';
  const bd = type === 'error' ? 'rgba(230,51,41,.25)' : 'rgba(34,197,94,.2)';
  const cl = type === 'error' ? '#ff7070' : '#4ade80';
  box.innerHTML = `<div style="padding:12px 16px;border-radius:8px;margin-bottom:16px;background:${bg};border:1px solid ${bd};color:${cl};font-size:.84rem;">${msg}</div>`;
  box.scrollIntoView({behavior:'smooth'});
}
</script>
{% endblock %}
