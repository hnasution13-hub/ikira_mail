services:
  web:
    build: .
    command: gunicorn hris_project.wsgi:application --config gunicorn.conf.py
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  mail:
    build:
      context: ./mail
      dockerfile: Dockerfile.mail
    volumes:
      - mail_media:/app/media
      - mail_static:/app/staticfiles
    expose:
      - "8001"
    env_file:
      - ./mail/.env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: hris_smartdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - mail_static:/app/mail_staticfiles
      - mail_media:/app/mail_media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - mail
    restart: unless-stopped

volumes:
  postgres_data:
  media_volume:
  static_volume:
  mail_media:
  mail_static:
